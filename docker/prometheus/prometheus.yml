# Aureon by Rhematek Solutions
# Prometheus Monitoring Configuration

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'aureon-production'
    environment: 'production'

# Alerting configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets: []
          # - 'alertmanager:9093'

# Rule files
rule_files:
  # - 'alerts/*.yml'

# Scrape configurations
scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
        labels:
          service: 'prometheus'

  # Django application metrics
  - job_name: 'django'
    static_configs:
      - targets: ['web:8000']
        labels:
          service: 'django_web'
          app: 'aureon'
    metrics_path: '/metrics'
    scrape_interval: 30s

  # PostgreSQL metrics (if postgres_exporter is added)
  - job_name: 'postgres'
    static_configs:
      - targets: ['db:5432']
        labels:
          service: 'postgresql'
          database: 'aureon_db'

  # Redis metrics (if redis_exporter is added)
  - job_name: 'redis'
    static_configs:
      - targets: ['redis:6379']
        labels:
          service: 'redis'
          role: 'cache_and_broker'

  # Nginx metrics (if nginx-prometheus-exporter is added)
  - job_name: 'nginx'
    static_configs:
      - targets: ['nginx:9113']
        labels:
          service: 'nginx'
          role: 'reverse_proxy'

  # Celery metrics (from Flower)
  - job_name: 'celery'
    static_configs:
      - targets: ['celery_flower:5555']
        labels:
          service: 'celery'
          role: 'task_queue'
    metrics_path: '/metrics'
    scrape_interval: 60s

# Remote write configuration (optional - for long-term storage)
