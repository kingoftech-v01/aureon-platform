# ============================================================
# Aureon SaaS Platform - Server Configuration
# Domain: aureon.rhematek-solutions.com
# Rhematek Production Shield with TLS 1.3
# ============================================================

# ============================================================
# HTTP to HTTPS Redirect
# ============================================================
server {
    listen 80;
    listen [::]:80;
    server_name aureon.rhematek-solutions.com *.aureon.rhematek-solutions.com;

    # Certbot ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }

    # Redirect all HTTP to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ============================================================
# HTTPS Main Application Server
# ============================================================
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name aureon.rhematek-solutions.com;

    # ============================================================
    # SSL/TLS Configuration (TLS 1.3 Priority)
    # ============================================================
    ssl_certificate /etc/letsencrypt/live/aureon.rhematek-solutions.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/aureon.rhematek-solutions.com/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/aureon.rhematek-solutions.com/chain.pem;

    # TLS 1.3 with TLS 1.2 fallback
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'TLS_AES_256_GCM_SHA384:TLS_CHACHA20_POLY1305_SHA256:TLS_AES_128_GCM_SHA256:ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305';
    ssl_prefer_server_ciphers off;
    ssl_early_data on;

    # ============================================================
    # Security Headers (HTTPS specific)
    # ============================================================
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://js.stripe.com https://cdn.jsdelivr.net https://cdnjs.cloudflare.com https://www.googletagmanager.com https://www.google-analytics.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdn.jsdelivr.net; font-src 'self' https://fonts.gstatic.com data: https://cdn.jsdelivr.net; img-src 'self' data: https: blob:; connect-src 'self' https://api.stripe.com https://www.google-analytics.com wss://*.aureon.rhematek-solutions.com; frame-src 'self' https://js.stripe.com https://hooks.stripe.com; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'; upgrade-insecure-requests;" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=(self)" always;

    # Root directory
    root /app;

    # ============================================================
    # Logging
    # ============================================================
    access_log /var/log/nginx/aureon_access.log json_combined buffer=16k flush=2m;
    error_log /var/log/nginx/aureon_error.log warn;

    # ============================================================
    # Rate Limiting (General)
    # ============================================================
    limit_req zone=general_limit burst=50 nodelay;
    limit_conn conn_limit 20;

    # ============================================================
    # Static Files (Nginx Direct Serve)
    # ============================================================
    location /static/ {
        alias /app/staticfiles/;
        limit_req zone=static_limit burst=100 nodelay;

        # Aggressive caching for static assets
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Vary "Accept-Encoding";
        access_log off;

        # Gzip static files
        gzip_static on;

        # Security headers for static files
        add_header X-Content-Type-Options "nosniff" always;
    }

    # ============================================================
    # Media Files (User Uploads)
    # ============================================================
    location /media/ {
        alias /app/media/;

        # Moderate caching for media
        expires 7d;
        add_header Cache-Control "public";
        add_header X-Content-Type-Options "nosniff" always;

        # Prevent execution of uploaded files
        location ~* \.(php|py|pl|sh|bash|cgi)$ {
            deny all;
        }
    }

    # ============================================================
    # Favicon and Robots
    # ============================================================
    location = /favicon.ico {
        alias /app/staticfiles/favicon.ico;
        expires 30d;
        access_log off;
    }

    location = /robots.txt {
        alias /app/staticfiles/robots.txt;
        expires 7d;
        access_log off;
    }

    # ============================================================
    # Sitemap
    # ============================================================
    location = /sitemap.xml {
        proxy_pass http://django_app;
        proxy_cache api_cache;
        proxy_cache_valid 200 1h;
    }

    # ============================================================
    # Health Check Endpoint
    # ============================================================
    location = /api/health/ {
        access_log off;
        proxy_pass http://django_app;
        proxy_connect_timeout 5s;
        proxy_read_timeout 5s;
    }

    location = /health/ {
        access_log off;
        proxy_pass http://django_app/api/health/;
    }

    # ============================================================
    # API Endpoints (Strict Rate Limiting)
    # ============================================================
    location /api/ {
        limit_req zone=api_limit burst=200 nodelay;
        limit_conn conn_limit 50;

        proxy_pass http://django_app;
        proxy_redirect off;

        # API-specific timeouts
        proxy_connect_timeout 30s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # CORS headers
        add_header Access-Control-Allow-Origin "https://aureon.rhematek-solutions.com" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-CSRFToken, X-Requested-With" always;
        add_header Access-Control-Allow-Credentials "true" always;
        add_header Access-Control-Max-Age "86400" always;

        # Handle preflight requests
        if ($request_method = 'OPTIONS') {
            add_header Access-Control-Allow-Origin "https://aureon.rhematek-solutions.com";
            add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS";
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-CSRFToken, X-Requested-With";
            add_header Access-Control-Max-Age "86400";
            add_header Content-Length 0;
            add_header Content-Type text/plain;
            return 204;
        }
    }

    # ============================================================
    # Stripe Webhooks (No Rate Limiting, Extended Timeout)
    # ============================================================
    location /stripe/webhook/ {
        limit_req zone=webhook_limit burst=100 nodelay;

        proxy_pass http://django_app;
        proxy_redirect off;

        # Extended timeout for webhooks
        proxy_read_timeout 90s;
        proxy_connect_timeout 30s;
        proxy_send_timeout 90s;

        # Don't buffer webhook requests
        proxy_buffering off;
        proxy_request_buffering off;
    }

    location /api/v1/webhooks/ {
        limit_req zone=webhook_limit burst=100 nodelay;

        proxy_pass http://django_app;
        proxy_redirect off;
        proxy_read_timeout 90s;
        proxy_buffering off;
    }

    # ============================================================
    # Authentication Endpoints (Very Strict Rate Limiting)
    # ============================================================
    location ~ ^/(accounts|auth|api/v1/auth)/ {
        limit_req zone=login_limit burst=5 nodelay;
        limit_conn conn_limit 5;

        proxy_pass http://django_app;
        proxy_redirect off;
    }

    # ============================================================
    # Admin Panel (IP Restricted + Auth)
    # ============================================================
    location /admin/ {
        # IP whitelist (add your IPs)
        # allow 1.2.3.4;
        # deny all;

        limit_req zone=login_limit burst=10 nodelay;

        proxy_pass http://django_app;
        proxy_redirect off;
    }

    # ============================================================
    # Monitoring Endpoints (Protected)
    # ============================================================
    location /flower/ {
        auth_basic "Restricted Access";
        auth_basic_user_file /etc/nginx/.htpasswd;

        proxy_pass http://flower_app/;
        proxy_redirect off;

        # WebSocket support for Flower
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }

    location /grafana/ {
        auth_basic "Restricted Access";
        auth_basic_user_file /etc/nginx/.htpasswd;

        proxy_pass http://grafana_app/;
        proxy_redirect off;
    }

    location /prometheus/ {
        auth_basic "Restricted Access";
        auth_basic_user_file /etc/nginx/.htpasswd;

        proxy_pass http://prometheus_app/;
        proxy_redirect off;
    }

    # ============================================================
    # Metrics Endpoint (Internal Only)
    # ============================================================
    location /metrics {
        allow 127.0.0.1;
        allow 172.28.0.0/16;
        deny all;

        proxy_pass http://django_app;
    }

    # ============================================================
    # Django Application (All Other Requests)
    # ============================================================
    location / {
        limit_req zone=general_limit burst=50 nodelay;

        proxy_pass http://django_app;
        proxy_redirect off;

        # Standard timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # Buffering
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 16k;
        proxy_busy_buffers_size 24k;
    }

    # ============================================================
    # Security: Block sensitive files
    # ============================================================
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~ /\.git {
        deny all;
    }

    location ~* \.(env|ini|log|bak|sql|conf)$ {
        deny all;
    }

    # ============================================================
    # Custom Error Pages
    # ============================================================
    error_page 400 /error/400.html;
    error_page 401 /error/401.html;
    error_page 403 /error/403.html;
    error_page 404 /error/404.html;
    error_page 500 502 503 504 /error/50x.html;

    location ^~ /error/ {
        internal;
        root /usr/share/nginx/error_pages;
    }
}

# ============================================================
# Tenant Subdomains (Multi-tenancy Support)
# ============================================================
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name ~^(?<tenant>.+)\.aureon\.rhematek-solutions\.com$;

    # SSL Certificate (wildcard)
    ssl_certificate /etc/letsencrypt/live/aureon.rhematek-solutions.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/aureon.rhematek-solutions.com/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/aureon.rhematek-solutions.com/chain.pem;

    # TLS 1.3 configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'TLS_AES_256_GCM_SHA384:TLS_CHACHA20_POLY1305_SHA256:TLS_AES_128_GCM_SHA256:ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers off;

    # Security Headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;

    # Logging
    access_log /var/log/nginx/tenant_access.log json_combined buffer=16k flush=2m;
    error_log /var/log/nginx/tenant_error.log warn;

    # Rate limiting
    limit_req zone=general_limit burst=30 nodelay;
    limit_conn conn_limit 15;

    # Static and media files
    location /static/ {
        alias /app/staticfiles/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        gzip_static on;
    }

    location /media/ {
        alias /app/media/;
        expires 7d;
        add_header Cache-Control "public";
    }

    # API endpoints
    location /api/ {
        limit_req zone=api_limit burst=100 nodelay;
        proxy_pass http://django_app;
        proxy_set_header X-Tenant $tenant;
    }

    # All other requests
    location / {
        proxy_pass http://django_app;
        proxy_set_header X-Tenant $tenant;
    }
}
