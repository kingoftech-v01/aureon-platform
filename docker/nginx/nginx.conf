# ============================================================
# Aureon SaaS Platform - Nginx Configuration
# Rhematek Production Shield
# High-performance, secure reverse proxy with TLS 1.3
# ============================================================

user nginx;
worker_processes auto;
worker_rlimit_nofile 65535;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

# Performance tuning
timer_resolution 100ms;
worker_priority -10;

events {
    worker_connections 65535;
    use epoll;
    multi_accept on;
    accept_mutex off;
}

http {
    # ============================================================
    # Basic Settings
    # ============================================================
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    charset utf-8;

    # ============================================================
    # Logging Configuration
    # ============================================================
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct="$upstream_connect_time" '
                    'uht="$upstream_header_time" urt="$upstream_response_time"';

    log_format json_combined escape=json '{'
        '"time_local":"$time_local",'
        '"remote_addr":"$remote_addr",'
        '"remote_user":"$remote_user",'
        '"request":"$request",'
        '"status": "$status",'
        '"body_bytes_sent":"$body_bytes_sent",'
        '"request_time":"$request_time",'
        '"http_referrer":"$http_referer",'
        '"http_user_agent":"$http_user_agent",'
        '"http_x_forwarded_for":"$http_x_forwarded_for",'
        '"upstream_response_time":"$upstream_response_time",'
        '"upstream_connect_time":"$upstream_connect_time",'
        '"upstream_header_time":"$upstream_header_time"'
    '}';

    access_log /var/log/nginx/access.log json_combined buffer=16k flush=2m;

    # ============================================================
    # Performance Optimizations
    # ============================================================
    sendfile on;
    sendfile_max_chunk 512k;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    keepalive_requests 1000;
    reset_timedout_connection on;
    types_hash_max_size 4096;
    server_names_hash_bucket_size 128;

    # Client settings
    client_max_body_size 50M;
    client_body_buffer_size 128k;
    client_header_buffer_size 4k;
    large_client_header_buffers 4 16k;
    client_body_timeout 60s;
    client_header_timeout 60s;
    send_timeout 60s;

    # ============================================================
    # Gzip Compression
    # ============================================================
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1000;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_types
        application/atom+xml
        application/geo+json
        application/javascript
        application/x-javascript
        application/json
        application/ld+json
        application/manifest+json
        application/rdf+xml
        application/rss+xml
        application/xhtml+xml
        application/xml
        font/eot
        font/otf
        font/ttf
        font/woff
        font/woff2
        image/svg+xml
        text/css
        text/javascript
        text/plain
        text/xml;
    gzip_disable "msie6";

    # ============================================================
    # Brotli Compression (if module available)
    # ============================================================
    # brotli on;
    # brotli_comp_level 6;
    # brotli_types application/json application/javascript text/css text/plain text/xml;

    # ============================================================
    # Rate Limiting Zones
    # ============================================================
    # Login/Auth endpoints - strict limit
    limit_req_zone $binary_remote_addr zone=login_limit:10m rate=5r/m;

    # API endpoints - moderate limit
    limit_req_zone $binary_remote_addr zone=api_limit:20m rate=100r/s;

    # General requests - relaxed limit
    limit_req_zone $binary_remote_addr zone=general_limit:10m rate=30r/s;

    # Webhook endpoints - special handling
    limit_req_zone $binary_remote_addr zone=webhook_limit:10m rate=50r/s;

    # Static files - no limit needed
    limit_req_zone $binary_remote_addr zone=static_limit:5m rate=200r/s;

    # ============================================================
    # Connection Limiting
    # ============================================================
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;
    limit_conn_zone $server_name zone=server_conn_limit:10m;

    # ============================================================
    # SSL/TLS Configuration (Global)
    # ============================================================
    # TLS 1.3 only for maximum security (TLS 1.2 as fallback)
    ssl_protocols TLSv1.2 TLSv1.3;

    # Modern cipher suite - TLS 1.3 ciphers are auto-selected
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305';
    ssl_prefer_server_ciphers off;

    # SSL session settings
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_session_tickets off;

    # OCSP Stapling
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 8.8.8.8 8.8.4.4 1.1.1.1 valid=300s;
    resolver_timeout 5s;

    # DH parameters (generate with: openssl dhparam -out /etc/nginx/ssl/dhparam.pem 4096)
    # ssl_dhparam /etc/nginx/ssl/dhparam.pem;

    # ECDH curve
    ssl_ecdh_curve secp384r1:secp256k1;

    # ============================================================
    # Security Headers (Global)
    # ============================================================
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=(self), usb=()" always;
    add_header X-Download-Options "noopen" always;
    add_header X-Permitted-Cross-Domain-Policies "none" always;

    # Hide Nginx version
    server_tokens off;
    more_clear_headers Server;

    # ============================================================
    # Proxy Settings (Global)
    # ============================================================
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Port $server_port;
    proxy_set_header Connection "";

    # Proxy timeouts
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;

    # Proxy buffering
    proxy_buffering on;
    proxy_buffer_size 4k;
    proxy_buffers 8 16k;
    proxy_busy_buffers_size 24k;
    proxy_temp_file_write_size 64k;

    # ============================================================
    # Upstream Configurations
    # ============================================================
    upstream django_app {
        zone django_upstream 64k;
        least_conn;
        server web:8000 weight=1 max_fails=3 fail_timeout=30s;
        keepalive 32;
        keepalive_requests 1000;
        keepalive_timeout 60s;
    }

    upstream flower_app {
        zone flower_upstream 32k;
        server flower:5555;
        keepalive 4;
    }

    upstream grafana_app {
        zone grafana_upstream 32k;
        server grafana:3000;
        keepalive 4;
    }

    upstream prometheus_app {
        zone prometheus_upstream 32k;
        server prometheus:9090;
        keepalive 4;
    }

    # ============================================================
    # Caching Configuration
    # ============================================================
    proxy_cache_path /var/cache/nginx/static
        levels=1:2
        keys_zone=static_cache:100m
        max_size=2g
        inactive=7d
        use_temp_path=off;

    proxy_cache_path /var/cache/nginx/api
        levels=1:2
        keys_zone=api_cache:50m
        max_size=500m
        inactive=1h
        use_temp_path=off;

    # ============================================================
    # Map for WebSocket upgrades
    # ============================================================
    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    # ============================================================
    # Map for real IP detection
    # ============================================================
    map $http_x_forwarded_for $real_ip {
        default $remote_addr;
        ~^(?P<firstaddr>[0-9.]+),?.*$ $firstaddr;
    }

    # ============================================================
    # Nginx status endpoint (for monitoring)
    # ============================================================
    server {
        listen 8080;
        server_name localhost;

        location /nginx_status {
            stub_status on;
            access_log off;
            allow 127.0.0.1;
            allow 172.28.0.0/16;
            deny all;
        }

        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }
    }

    # ============================================================
    # Include server configurations
    # ============================================================
    include /etc/nginx/conf.d/*.conf;
}
