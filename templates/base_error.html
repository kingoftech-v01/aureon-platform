<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>{% block title %}Error{% endblock %} - Aureon by Rhematek</title>
    <meta name="robots" content="noindex, nofollow">
    <meta name="theme-color" content="#2563eb">

    <!-- Preconnect for performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <style>
        :root {
            --primary-color: #2563eb;
            --primary-dark: #1d4ed8;
            --secondary-color: #64748b;
            --background: #f8fafc;
            --surface: #ffffff;
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --error-red: #ef4444;
            --warning-yellow: #f59e0b;
            --success-green: #22c55e;
            --focus-ring: #2563eb;
        }

        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, var(--background) 0%, #e2e8f0 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            line-height: 1.6;
            color: var(--text-primary);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* Skip link for accessibility */
        .skip-link {
            position: absolute;
            top: -100px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--primary-color);
            color: #ffffff;
            padding: 0.75rem 1.5rem;
            z-index: 9999;
            border-radius: 0 0 0.5rem 0.5rem;
            text-decoration: none;
            font-weight: 600;
            transition: top 0.3s ease;
        }

        .skip-link:focus {
            top: 0;
            outline: 2px solid var(--focus-ring);
            outline-offset: 2px;
        }

        /* Focus visible styles */
        :focus-visible {
            outline: 2px solid var(--focus-ring);
            outline-offset: 2px;
        }

        /* Visually hidden for screen readers */
        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0;
        }

        .error-container {
            background: var(--surface);
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.1);
            max-width: 600px;
            width: 100%;
            padding: 48px;
            text-align: center;
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo {
            margin-bottom: 32px;
        }

        .logo svg {
            width: 48px;
            height: 48px;
            fill: var(--primary-color);
        }

        .logo-text {
            font-size: 24px;
            font-weight: 700;
            color: var(--text-primary);
            margin-top: 8px;
        }

        .logo-subtitle {
            font-size: 12px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .error-code {
            font-size: 120px;
            font-weight: 800;
            line-height: 1;
            margin-bottom: 16px;
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--primary-dark) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .error-code.error-500 {
            background: linear-gradient(135deg, var(--error-red) 0%, #dc2626 100%);
            -webkit-background-clip: text;
            background-clip: text;
        }

        .error-code.error-403 {
            background: linear-gradient(135deg, var(--warning-yellow) 0%, #d97706 100%);
            -webkit-background-clip: text;
            background-clip: text;
        }

        .error-code.error-429 {
            background: linear-gradient(135deg, var(--secondary-color) 0%, #475569 100%);
            -webkit-background-clip: text;
            background-clip: text;
        }

        .error-title {
            font-size: 24px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 12px;
        }

        .error-message {
            font-size: 16px;
            color: var(--text-secondary);
            line-height: 1.6;
            margin-bottom: 32px;
        }

        .error-actions {
            display: flex;
            gap: 16px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.2s ease;
            cursor: pointer;
            border: none;
        }

        .btn:focus-visible {
            outline: 2px solid var(--focus-ring);
            outline-offset: 2px;
        }

        .btn-primary {
            background: var(--primary-color);
            color: white;
        }

        .btn-primary:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
        }

        .btn-secondary {
            background: var(--background);
            color: var(--text-primary);
            border: 1px solid #e2e8f0;
        }

        .btn-secondary:hover {
            background: #e2e8f0;
        }

        /* Disabled button state */
        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .error-details {
            margin-top: 32px;
            padding-top: 24px;
            border-top: 1px solid #e2e8f0;
            font-size: 13px;
            color: var(--text-secondary);
        }

        .error-id {
            font-family: 'SF Mono', Monaco, 'Cascadia Code', monospace;
            background: var(--background);
            padding: 4px 8px;
            border-radius: 4px;
        }

        .support-link {
            color: var(--primary-color);
            text-decoration: none;
        }

        .support-link:hover {
            text-decoration: underline;
        }

        .support-link:focus-visible {
            outline: 2px solid var(--focus-ring);
            outline-offset: 2px;
            border-radius: 2px;
        }

        /* High contrast mode support */
        @media (forced-colors: active) {
            .btn {
                border: 2px solid currentColor;
            }
            .error-code {
                -webkit-text-fill-color: currentColor;
            }
        }

        @media (max-width: 480px) {
            .error-container {
                padding: 32px 24px;
            }

            .error-code {
                font-size: 80px;
            }

            .error-title {
                font-size: 20px;
            }

            .error-actions {
                flex-direction: column;
            }

            .btn {
                width: 100%;
                justify-content: center;
            }
        }

        /* Print styles */
        @media print {
            body {
                background: white;
            }
            .error-container {
                box-shadow: none;
                border: 1px solid #e2e8f0;
            }
            .btn {
                display: none;
            }
        }
    </style>
    {% block extra_styles %}{% endblock %}
</head>
<body>
    <!-- Skip link for accessibility -->
    <a href="#main-content" class="skip-link">Skip to main content</a>

    <main id="main-content" role="main" aria-labelledby="error-heading">
        <div class="error-container">
            <div class="logo" aria-hidden="true">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                    <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
                </svg>
                <div class="logo-text">Aureon</div>
                <div class="logo-subtitle">by Rhematek Solutions</div>
            </div>

            {% block content %}{% endblock %}

            <div class="error-details" role="contentinfo">
                {% block details %}
                <p>
                    Need help? Contact <a href="mailto:support@rhematek-solutions.com" class="support-link">support@rhematek-solutions.com</a>
                </p>
                {% endblock %}
            </div>
        </div>
    </main>

    {% block extra_scripts %}{% endblock %}
</body>
</html>
