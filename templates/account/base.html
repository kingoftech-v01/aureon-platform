{% load static i18n %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>{% block title %}Account - Aureon{% endblock %}</title>
    <meta name="description" content="{% block meta_description %}Aureon account management - secure login, signup, and account settings.{% endblock %}">

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="{% static 'plax/img/logo.png' %}">

    <!-- Plax Stylesheets -->
    <link rel="stylesheet" href="{% static 'plax/css/plugins/bootstrap-grid.css' %}">
    <link rel="stylesheet" href="{% static 'plax/fonts/css/font-awesome.min.css' %}">
    <link rel="stylesheet" href="{% static 'plax/fonts/css/switzer.css' %}">
    <link rel="stylesheet" href="{% static 'plax/css/style.css' %}">

    <style>
        /* Auth Page Specific Styles */
        body {
            font-family: 'Switzer', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        .auth-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
            padding: 40px 20px;
        }

        .auth-container {
            width: 100%;
            max-width: 480px;
        }

        .auth-logo {
            text-align: center;
            margin-bottom: 40px;
        }

        .auth-logo a {
            font-size: 32px;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-decoration: none;
        }

        .auth-card {
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.08);
            padding: 40px;
        }

        .auth-card.auth-card-wide {
            max-width: 600px;
        }

        .auth-title {
            font-size: 28px;
            font-weight: 700;
            color: #0f0d1d;
            margin-bottom: 8px;
            text-align: center;
        }

        .auth-subtitle {
            color: #6b7280;
            margin-bottom: 30px;
            text-align: center;
            font-size: 16px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            font-weight: 500;
            color: #374151;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .form-control {
            width: 100%;
            border: 1px solid #e5e7eb;
            padding: 14px 16px;
            border-radius: 8px;
            font-size: 15px;
            transition: all 0.3s ease;
            background: #fff;
            color: #374151;
            box-sizing: border-box;
        }

        .form-control:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.15);
            outline: none;
        }

        .form-control.is-invalid {
            border-color: #ef4444;
        }

        .form-check {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .form-check-input {
            width: 18px;
            height: 18px;
            border: 1px solid #d1d5db;
            border-radius: 4px;
            cursor: pointer;
        }

        .form-check-label {
            color: #6b7280;
            font-size: 14px;
            cursor: pointer;
        }

        .btn {
            display: inline-block;
            padding: 14px 24px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 16px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            border: none;
            text-decoration: none;
            box-sizing: border-box;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            width: 100%;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-secondary {
            background: #f3f4f6;
            border: 1px solid #e5e7eb;
            color: #374151;
            width: 100%;
        }

        .btn-secondary:hover {
            background: #e5e7eb;
        }

        .btn-outline {
            border: 2px solid #667eea;
            color: #667eea;
            background: transparent;
        }

        .btn-outline:hover {
            background: #667eea;
            color: #fff;
        }

        .btn-danger {
            background: #ef4444;
            color: #fff;
        }

        .btn-danger:hover {
            background: #dc2626;
        }

        .btn-sm {
            padding: 10px 16px;
            font-size: 14px;
        }

        .auth-link {
            color: #667eea;
            text-decoration: none;
            font-weight: 500;
        }

        .auth-link:hover {
            color: #4f46e5;
            text-decoration: underline;
        }

        .auth-divider {
            display: flex;
            align-items: center;
            margin: 24px 0;
        }

        .auth-divider::before,
        .auth-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #e5e7eb;
        }

        .auth-divider span {
            padding: 0 16px;
            color: #9ca3af;
            font-size: 14px;
        }

        .errorlist {
            list-style: none;
            padding: 0;
            margin: 8px 0 0 0;
        }

        .errorlist li {
            color: #ef4444;
            font-size: 13px;
        }

        .alert {
            border-radius: 8px;
            border: none;
            padding: 14px 16px;
            margin-bottom: 20px;
            font-size: 14px;
        }

        .alert-success {
            background: #ecfdf5;
            color: #065f46;
        }

        .alert-danger, .alert-error {
            background: #fef2f2;
            color: #991b1b;
        }

        .alert-warning {
            background: #fffbeb;
            color: #92400e;
        }

        .alert-info {
            background: #eff6ff;
            color: #1e40af;
        }

        .text-center {
            text-align: center;
        }

        .text-muted {
            color: #6b7280;
        }

        .mb-0 { margin-bottom: 0; }
        .mb-3 { margin-bottom: 16px; }
        .mb-4 { margin-bottom: 24px; }
        .mt-3 { margin-top: 16px; }
        .mt-4 { margin-top: 24px; }

        .d-flex {
            display: flex;
        }

        .justify-content-between {
            justify-content: space-between;
        }

        .align-items-center {
            align-items: center;
        }

        .small {
            font-size: 13px;
        }

        /* Email list for email management */
        .email-list {
            list-style: none;
            padding: 0;
            margin: 0 0 24px 0;
        }

        .email-list li {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            margin-bottom: 10px;
            background: #f9fafb;
        }

        .email-list .badge {
            font-size: 11px;
            font-weight: 500;
            padding: 4px 10px;
            border-radius: 20px;
            margin-left: 8px;
        }

        .badge {
            display: inline-block;
            font-size: 11px;
            font-weight: 500;
            padding: 4px 10px;
            border-radius: 20px;
        }

        .badge-success {
            background: #ecfdf5;
            color: #065f46;
        }

        .badge-warning {
            background: #fffbeb;
            color: #92400e;
        }

        .badge-primary {
            background: #eff6ff;
            color: #1e40af;
        }

        /* Button group */
        .btn-group {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .btn-group .btn {
            flex: 1;
            min-width: 120px;
        }

        /* QR Code styling for 2FA */
        .qr-code-container {
            text-align: center;
            padding: 20px;
            background: #f9fafb;
            border-radius: 12px;
            margin-bottom: 24px;
        }

        .qr-code-container img,
        .qr-code-container svg {
            max-width: 200px;
            height: auto;
        }

        .secret-key {
            font-family: monospace;
            background: #f3f4f6;
            padding: 12px;
            border-radius: 8px;
            word-break: break-all;
            font-size: 14px;
            margin-top: 16px;
        }

        /* Recovery codes */
        .recovery-codes {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin: 20px 0;
        }

        .recovery-codes code {
            font-family: monospace;
            background: #f3f4f6;
            padding: 10px;
            border-radius: 6px;
            text-align: center;
            font-size: 14px;
        }

        /* Info box */
        .info-box {
            background: #eff6ff;
            border-left: 4px solid #3b82f6;
            padding: 16px;
            border-radius: 0 8px 8px 0;
            margin-bottom: 24px;
        }

        .info-box p {
            margin: 0;
            color: #1e40af;
            font-size: 14px;
        }

        /* Security methods list */
        .security-methods {
            list-style: none;
            padding: 0;
            margin: 0 0 24px 0;
        }

        .security-methods li {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            margin-bottom: 12px;
            background: #fff;
        }

        .security-methods .method-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .security-methods .method-icon {
            width: 40px;
            height: 40px;
            background: #f3f4f6;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        .security-methods .method-name {
            font-weight: 600;
            color: #0f0d1d;
        }

        .security-methods .method-status {
            font-size: 13px;
            color: #6b7280;
        }

        /* Footer link */
        .auth-footer {
            text-align: center;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #e5e7eb;
        }

        .auth-footer a {
            color: #6b7280;
            text-decoration: none;
            font-size: 14px;
        }

        .auth-footer a:hover {
            color: #667eea;
        }

        /* Responsive */
        @media (max-width: 480px) {
            .auth-card {
                padding: 30px 24px;
            }

            .auth-title {
                font-size: 24px;
            }

            .btn-group {
                flex-direction: column;
            }

            .btn-group .btn {
                width: 100%;
            }

            .recovery-codes {
                grid-template-columns: 1fr;
            }
        }
    </style>
    {% block auth_extra_css %}{% endblock %}
</head>

<body>
    <div class="auth-page">
        <div class="auth-container {% block container_class %}{% endblock %}">
            <!-- Logo -->
            <div class="auth-logo">
                <a href="/">Aureon</a>
            </div>

            <!-- Auth Card -->
            <div class="auth-card {% block auth_card_class %}{% endblock %}">
                {% if messages %}
                    {% for message in messages %}
                        <div class="alert alert-{{ message.tags }}" role="alert">
                            {{ message }}
                        </div>
                    {% endfor %}
                {% endif %}

                {% block auth_content %}{% endblock %}
            </div>

            <!-- Footer -->
            <div class="auth-footer">
                <a href="/">&larr; Back to Home</a>
            </div>
        </div>
    </div>

    {% block auth_extra_js %}{% endblock %}
</body>
</html>
