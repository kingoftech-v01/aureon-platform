# ============================================================
# AUREON SaaS Platform - Production Docker Compose
# Rhematek Production Shield + Scale8 Configuration
# Domain: aureon.rhematek-solutions.com
# Supports: 1M users, 500K concurrent connections
# ============================================================

version: '3.8'

services:
  # ============================================================
  # POSTGRESQL MASTER DATABASE (PostgreSQL 16)
  # ============================================================
  db:
    image: postgres:16-alpine
    container_name: aureon-db-master
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - ./backups:/backups
    environment:
      - POSTGRES_DB=${DB_NAME:-aureon_db}
      - POSTGRES_USER=${DB_USER:-aureon_user}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_INITDB_ARGS=--encoding=UTF-8 --lc-collate=C --lc-ctype=C
      - PGDATA=/var/lib/postgresql/data/pgdata
    command: >
      postgres
      -c max_connections=200
      -c shared_buffers=256MB
      -c effective_cache_size=1GB
      -c maintenance_work_mem=128MB
      -c checkpoint_completion_target=0.9
      -c wal_buffers=16MB
      -c default_statistics_target=100
      -c random_page_cost=1.1
      -c effective_io_concurrency=200
      -c log_statement=mod
      -c log_min_duration_statement=100
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-aureon_user} -d ${DB_NAME:-aureon_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - aureon-network
    restart: always
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 4G

  # ============================================================
  # REDIS CACHE (Dedicated for Django Cache - Redis 7.4)
  # ============================================================
  redis-cache:
    image: redis:7.4-alpine
    container_name: aureon-redis-cache
    command: >
      redis-server
      --appendonly yes
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --tcp-keepalive 300
    volumes:
      - redis_cache_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - aureon-network
    restart: always

  # ============================================================
  # REDIS QUEUE (Dedicated for Celery Broker - Redis 7.4)
  # ============================================================
  redis-queue:
    image: redis:7.4-alpine
    container_name: aureon-redis-queue
    command: >
      redis-server
      --appendonly yes
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 1gb
      --maxmemory-policy noeviction
    volumes:
      - redis_queue_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - aureon-network
    restart: always

  # ============================================================
  # DJANGO WEB APPLICATION (Gunicorn + ASGI)
  # Scale: 10-100 replicas
  # ============================================================
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aureon-web
    command: >
      gunicorn config.wsgi:application
      --bind 0.0.0.0:8000
      --workers 4
      --threads 4
      --worker-class gthread
      --worker-connections 1000
      --max-requests 10000
      --max-requests-jitter 1000
      --timeout 30
      --keep-alive 5
      --access-logfile -
      --error-logfile -
      --capture-output
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    env_file:
      - .env
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings
      - DATABASE_URL=postgresql://${DB_USER:-aureon_user}:${DB_PASSWORD}@db:5432/${DB_NAME:-aureon_db}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis-cache:6379/0
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD}@redis-queue:6379/1
    depends_on:
      db:
        condition: service_healthy
      redis-cache:
        condition: service_healthy
      redis-queue:
        condition: service_healthy
    networks:
      - aureon-network
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      replicas: 5
      resources:
        limits:
          cpus: '2'
          memory: 2G

  # ============================================================
  # CELERY WORKER - HIGH PRIORITY TASKS
  # ============================================================
  celery-high:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aureon-celery-high
    command: >
      celery -A config worker
      --loglevel=info
      --concurrency=4
      --queues=high_priority,default
      --max-tasks-per-child=1000
    env_file:
      - .env
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings
      - DATABASE_URL=postgresql://${DB_USER:-aureon_user}:${DB_PASSWORD}@db:5432/${DB_NAME:-aureon_db}
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD}@redis-queue:6379/1
      - CELERY_RESULT_BACKEND=redis://:${REDIS_PASSWORD}@redis-queue:6379/2
    depends_on:
      db:
        condition: service_healthy
      redis-queue:
        condition: service_healthy
    networks:
      - aureon-network
    restart: always
    deploy:
      replicas: 5

  # ============================================================
  # CELERY WORKER - LOW PRIORITY / BATCH TASKS
  # ============================================================
  celery-low:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aureon-celery-low
    command: >
      celery -A config worker
      --loglevel=info
      --concurrency=2
      --queues=low_priority,batch,analytics
      --max-tasks-per-child=500
    env_file:
      - .env
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings
      - DATABASE_URL=postgresql://${DB_USER:-aureon_user}:${DB_PASSWORD}@db:5432/${DB_NAME:-aureon_db}
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD}@redis-queue:6379/1
    depends_on:
      db:
        condition: service_healthy
      redis-queue:
        condition: service_healthy
    networks:
      - aureon-network
    restart: always
    deploy:
      replicas: 3

  # ============================================================
  # CELERY BEAT SCHEDULER
  # ============================================================
  celery-beat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aureon-celery-beat
    command: >
      celery -A config beat
      --loglevel=info
      --scheduler django_celery_beat.schedulers:DatabaseScheduler
    env_file:
      - .env
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings
      - DATABASE_URL=postgresql://${DB_USER:-aureon_user}:${DB_PASSWORD}@db:5432/${DB_NAME:-aureon_db}
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD}@redis-queue:6379/1
    depends_on:
      db:
        condition: service_healthy
      redis-queue:
        condition: service_healthy
    networks:
      - aureon-network
    restart: always

  # ============================================================
  # NGINX REVERSE PROXY + SSL + LOAD BALANCER
  # ============================================================
  nginx:
    image: nginx:1.25-alpine
    container_name: aureon-nginx
    volumes:
      - ./docker/nginx/nginx.prod.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro
      - static_volume:/app/staticfiles:ro
      - media_volume:/app/media:ro
      - ./docker/nginx/ssl:/etc/nginx/ssl:ro
      - ./docker/nginx/error_pages:/usr/share/nginx/error_pages:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - web
    networks:
      - aureon-network
    restart: always
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ============================================================
  # PROMETHEUS MONITORING
  # ============================================================
  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: aureon-prometheus
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./docker/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
    ports:
      - "9090:9090"
    networks:
      - aureon-network
    restart: always

  # ============================================================
  # GRAFANA DASHBOARDS
  # ============================================================
  grafana:
    image: grafana/grafana:10.2.0
    container_name: aureon-grafana
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_SERVER_ROOT_URL=https://aureon.rhematek-solutions.com/grafana
      - GF_SECURITY_ALLOW_EMBEDDING=true
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    networks:
      - aureon-network
    restart: always

  # ============================================================
  # FLOWER - CELERY MONITORING
  # ============================================================
  flower:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aureon-flower
    command: >
      celery -A config flower
      --port=5555
      --basic_auth=${FLOWER_USER:-admin}:${FLOWER_PASSWORD:-admin}
    env_file:
      - .env
    environment:
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD}@redis-queue:6379/1
    ports:
      - "5555:5555"
    depends_on:
      - redis-queue
    networks:
      - aureon-network
    restart: always

# ============================================================
# NETWORKS
# ============================================================
networks:
  aureon-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

# ============================================================
# VOLUMES
# ============================================================
volumes:
  postgres_data:
    driver: local
  redis_cache_data:
    driver: local
  redis_queue_data:
    driver: local
  static_volume:
    driver: local
  media_volume:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
