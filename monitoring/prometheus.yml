# ============================================================
# Aureon SaaS Platform - Prometheus Configuration
# Rhematek Production Shield
# ============================================================

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s
  external_labels:
    cluster: 'aureon-production'
    environment: 'production'
    region: 'primary'

# ============================================================
# Alerting Configuration
# ============================================================
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - 'alertmanager:9093'
      timeout: 10s
      api_version: v2

# ============================================================
# Rule Files
# ============================================================
rule_files:
  - '/etc/prometheus/alerts.yml'

# ============================================================
# Scrape Configurations
# ============================================================
scrape_configs:
  # ============================================================
  # Prometheus Self-Monitoring
  # ============================================================
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
        labels:
          service: 'prometheus'
          component: 'monitoring'
    metrics_path: /metrics

  # ============================================================
  # Django Application Metrics
  # ============================================================
  - job_name: 'django'
    static_configs:
      - targets: ['web:8000']
        labels:
          service: 'django'
          app: 'aureon'
          tier: 'web'
    metrics_path: '/metrics'
    scrape_interval: 30s
    scrape_timeout: 10s

  # ============================================================
  # PostgreSQL Metrics
  # ============================================================
  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres-exporter:9187']
        labels:
          service: 'postgresql'
          database: 'aureon_db'
          tier: 'database'
    scrape_interval: 30s

  # ============================================================
  # Redis Metrics
  # ============================================================
  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121']
        labels:
          service: 'redis'
          tier: 'cache'
    scrape_interval: 15s

  # ============================================================
  # Nginx Metrics
  # ============================================================
  - job_name: 'nginx'
    static_configs:
      - targets: ['nginx-exporter:9113']
        labels:
          service: 'nginx'
          tier: 'proxy'
    scrape_interval: 15s

  # ============================================================
  # Celery Metrics (via Flower)
  # ============================================================
  - job_name: 'celery'
    static_configs:
      - targets: ['flower:5555']
        labels:
          service: 'celery'
          tier: 'worker'
    metrics_path: '/metrics'
    scrape_interval: 30s

  # ============================================================
  # Node Exporter (Host Metrics)
  # ============================================================
  - job_name: 'node'
    static_configs:
      - targets: ['node-exporter:9100']
        labels:
          service: 'node'
          tier: 'infrastructure'
    scrape_interval: 15s

  # ============================================================
  # cAdvisor (Container Metrics)
  # ============================================================
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']
        labels:
          service: 'cadvisor'
          tier: 'infrastructure'
    scrape_interval: 15s
    metrics_path: /metrics

  # ============================================================
  # PgBouncer Metrics
  # ============================================================
  - job_name: 'pgbouncer'
    static_configs:
      - targets: ['pgbouncer:6432']
        labels:
          service: 'pgbouncer'
          tier: 'database'
    scrape_interval: 30s

