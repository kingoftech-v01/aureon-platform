# ============================================================
# Aureon SaaS Platform - Prometheus Alert Rules
# Rhematek Production Shield
# ============================================================

groups:
  # ============================================================
  # Infrastructure Alerts
  # ============================================================
  - name: infrastructure
    interval: 30s
    rules:
      - alert: HighCPUUsage
        expr: 100 - (avg by(instance) (irate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 80
        for: 5m
        labels:
          severity: warning
          team: infrastructure
        annotations:
          summary: "High CPU usage detected"
          description: "CPU usage is above 80% on {{ $labels.instance }} for more than 5 minutes. Current value: {{ $value }}%"

      - alert: CriticalCPUUsage
        expr: 100 - (avg by(instance) (irate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 95
        for: 2m
        labels:
          severity: critical
          team: infrastructure
        annotations:
          summary: "Critical CPU usage detected"
          description: "CPU usage is above 95% on {{ $labels.instance }}. Immediate action required. Current value: {{ $value }}%"

      - alert: HighMemoryUsage
        expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 85
        for: 5m
        labels:
          severity: warning
          team: infrastructure
        annotations:
          summary: "High memory usage detected"
          description: "Memory usage is above 85% on {{ $labels.instance }}. Current value: {{ $value }}%"

      - alert: CriticalMemoryUsage
        expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 95
        for: 2m
        labels:
          severity: critical
          team: infrastructure
        annotations:
          summary: "Critical memory usage"
          description: "Memory usage is above 95% on {{ $labels.instance }}. OOM killer may be triggered. Current value: {{ $value }}%"

      - alert: DiskSpaceLow
        expr: (1 - (node_filesystem_avail_bytes{fstype!~"tmpfs|overlay"} / node_filesystem_size_bytes{fstype!~"tmpfs|overlay"})) * 100 > 80
        for: 5m
        labels:
          severity: warning
          team: infrastructure
        annotations:
          summary: "Disk space running low"
          description: "Disk usage is above 80% on {{ $labels.device }} ({{ $labels.mountpoint }}). Current value: {{ $value }}%"

      - alert: DiskSpaceCritical
        expr: (1 - (node_filesystem_avail_bytes{fstype!~"tmpfs|overlay"} / node_filesystem_size_bytes{fstype!~"tmpfs|overlay"})) * 100 > 95
        for: 2m
        labels:
          severity: critical
          team: infrastructure
        annotations:
          summary: "Disk space critically low"
          description: "Disk usage is above 95% on {{ $labels.device }}. Immediate action required."

  # ============================================================
  # Application Alerts
  # ============================================================
  - name: application
    interval: 30s
    rules:
      - alert: DjangoHighLatency
        expr: histogram_quantile(0.95, sum(rate(django_http_requests_latency_seconds_bucket[5m])) by (le)) > 2
        for: 5m
        labels:
          severity: warning
          team: backend
        annotations:
          summary: "High API latency detected"
          description: "95th percentile latency is above 2 seconds. Current value: {{ $value }}s"

      - alert: DjangoHighErrorRate
        expr: sum(rate(django_http_responses_total_by_status_view_method_total{status=~"5.."}[5m])) / sum(rate(django_http_responses_total_by_status_view_method_total[5m])) * 100 > 5
        for: 2m
        labels:
          severity: critical
          team: backend
        annotations:
          summary: "High error rate in Django application"
          description: "Error rate is above 5%. Current value: {{ $value }}%"

      - alert: DjangoServiceDown
        expr: up{job="django"} == 0
        for: 1m
        labels:
          severity: critical
          team: backend
        annotations:
          summary: "Django application is down"
          description: "Django application on {{ $labels.instance }} has been down for more than 1 minute."

      - alert: HealthCheckFailed
        expr: probe_success{job="blackbox"} == 0
        for: 2m
        labels:
          severity: critical
          team: backend
        annotations:
          summary: "Health check failed"
          description: "Health check is failing for {{ $labels.instance }}."

  # ============================================================
  # Database Alerts
  # ============================================================
  - name: database
    interval: 30s
    rules:
      - alert: PostgreSQLDown
        expr: pg_up == 0
        for: 1m
        labels:
          severity: critical
          team: database
        annotations:
          summary: "PostgreSQL is down"
          description: "PostgreSQL instance {{ $labels.instance }} is down."

      - alert: PostgreSQLHighConnections
        expr: pg_stat_activity_count / pg_settings_max_connections * 100 > 80
        for: 5m
        labels:
          severity: warning
          team: database
        annotations:
          summary: "PostgreSQL connection pool nearly exhausted"
          description: "Connection usage is above 80%. Current value: {{ $value }}%"

      - alert: PostgreSQLSlowQueries
        expr: rate(pg_stat_activity_max_tx_duration{state="active"}[5m]) > 60
        for: 5m
        labels:
          severity: warning
          team: database
        annotations:
          summary: "PostgreSQL slow queries detected"
          description: "Queries taking longer than 60 seconds detected."

      - alert: PostgreSQLReplicationLag
        expr: pg_replication_lag > 30
        for: 2m
        labels:
          severity: warning
          team: database
        annotations:
          summary: "PostgreSQL replication lag"
          description: "Replication lag is {{ $value }} seconds."

      - alert: PostgreSQLDeadlocks
        expr: increase(pg_stat_database_deadlocks[5m]) > 5
        for: 5m
        labels:
          severity: warning
          team: database
        annotations:
          summary: "PostgreSQL deadlocks detected"
          description: "{{ $value }} deadlocks detected in the last 5 minutes."

  # ============================================================
  # Redis Alerts
  # ============================================================
  - name: redis
    interval: 30s
    rules:
      - alert: RedisDown
        expr: redis_up == 0
        for: 1m
        labels:
          severity: critical
          team: infrastructure
        annotations:
          summary: "Redis is down"
          description: "Redis instance {{ $labels.instance }} is down."

      - alert: RedisHighMemoryUsage
        expr: redis_memory_used_bytes / redis_memory_max_bytes * 100 > 80
        for: 5m
        labels:
          severity: warning
          team: infrastructure
        annotations:
          summary: "Redis memory usage high"
          description: "Redis memory usage is above 80%. Current value: {{ $value }}%"

      - alert: RedisKeyEviction
        expr: rate(redis_evicted_keys_total[5m]) > 100
        for: 5m
        labels:
          severity: warning
          team: infrastructure
        annotations:
          summary: "Redis key eviction rate high"
          description: "Redis is evicting {{ $value }} keys per second."

      - alert: RedisTooManyConnections
        expr: redis_connected_clients > 1000
        for: 5m
        labels:
          severity: warning
          team: infrastructure
        annotations:
          summary: "Redis has too many connections"
          description: "Redis has {{ $value }} connected clients."

  # ============================================================
  # Celery Alerts
  # ============================================================
  - name: celery
    interval: 30s
    rules:
      - alert: CeleryWorkerDown
        expr: flower_worker_online == 0
        for: 2m
        labels:
          severity: critical
          team: backend
        annotations:
          summary: "Celery worker is down"
          description: "Celery worker {{ $labels.worker }} has been offline for more than 2 minutes."

      - alert: CeleryQueueBacklog
        expr: flower_tasks_pending_count > 1000
        for: 5m
        labels:
          severity: warning
          team: backend
        annotations:
          summary: "Celery task queue backlog"
          description: "There are {{ $value }} pending tasks in the queue."

      - alert: CeleryHighTaskFailureRate
        expr: rate(flower_tasks_failed_count[5m]) / rate(flower_tasks_succeeded_count[5m]) * 100 > 10
        for: 5m
        labels:
          severity: warning
          team: backend
        annotations:
          summary: "High Celery task failure rate"
          description: "Task failure rate is above 10%. Current value: {{ $value }}%"

  # ============================================================
  # Nginx Alerts
  # ============================================================
  - name: nginx
    interval: 30s
    rules:
      - alert: NginxDown
        expr: nginx_up == 0
        for: 1m
        labels:
          severity: critical
          team: infrastructure
        annotations:
          summary: "Nginx is down"
          description: "Nginx on {{ $labels.instance }} has been down for more than 1 minute."

      - alert: NginxHighRequestRate
        expr: rate(nginx_http_requests_total[5m]) > 10000
        for: 5m
        labels:
          severity: info
          team: infrastructure
        annotations:
          summary: "High request rate detected"
          description: "Nginx is handling {{ $value }} requests per second."

      - alert: NginxHighErrorRate
        expr: rate(nginx_http_requests_total{status=~"5.."}[5m]) / rate(nginx_http_requests_total[5m]) * 100 > 5
        for: 5m
        labels:
          severity: warning
          team: infrastructure
        annotations:
          summary: "High Nginx error rate"
          description: "5xx error rate is above 5%. Current value: {{ $value }}%"

  # ============================================================
  # Container Alerts
  # ============================================================
  - name: containers
    interval: 30s
    rules:
      - alert: ContainerKilled
        expr: time() - container_last_seen > 60
        for: 1m
        labels:
          severity: warning
          team: infrastructure
        annotations:
          summary: "Container was killed"
          description: "Container {{ $labels.name }} was killed."

      - alert: ContainerCPUUsageHigh
        expr: (sum(rate(container_cpu_usage_seconds_total{name!=""}[3m])) by (name) * 100) > 80
        for: 5m
        labels:
          severity: warning
          team: infrastructure
        annotations:
          summary: "Container high CPU usage"
          description: "Container {{ $labels.name }} CPU usage is above 80%. Current value: {{ $value }}%"

      - alert: ContainerMemoryUsageHigh
        expr: (container_memory_usage_bytes{name!=""} / container_spec_memory_limit_bytes{name!=""}) * 100 > 80
        for: 5m
        labels:
          severity: warning
          team: infrastructure
        annotations:
          summary: "Container high memory usage"
          description: "Container {{ $labels.name }} memory usage is above 80%. Current value: {{ $value }}%"

      - alert: ContainerRestartingFrequently
        expr: increase(container_restart_count{name!=""}[1h]) > 5
        for: 10m
        labels:
          severity: warning
          team: infrastructure
        annotations:
          summary: "Container restarting frequently"
          description: "Container {{ $labels.name }} has restarted {{ $value }} times in the last hour."
