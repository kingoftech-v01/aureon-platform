# ============================================================
# Aureon SaaS Platform - Alertmanager Configuration
# Rhematek Production Shield
# ============================================================

global:
  # SMTP configuration for email alerts
  smtp_smarthost: 'smtp.example.com:587'
  smtp_from: 'alerts@aureon.rhematek-solutions.com'
  smtp_auth_username: 'alerts@aureon.rhematek-solutions.com'
  smtp_auth_password: '${SMTP_PASSWORD}'
  smtp_require_tls: true

  # Slack configuration
  slack_api_url: '${SLACK_WEBHOOK_URL}'

  # PagerDuty configuration (optional)
  # pagerduty_url: 'https://events.pagerduty.com/v2/enqueue'

  # Resolve timeout
  resolve_timeout: 5m

# ============================================================
# Templates
# ============================================================
templates:
  - '/etc/alertmanager/templates/*.tmpl'

# ============================================================
# Route Tree
# ============================================================
route:
  # Default receiver
  receiver: 'slack-notifications'

  # Group alerts by these labels
  group_by: ['alertname', 'cluster', 'service']

  # Wait time before sending first notification
  group_wait: 30s

  # Wait time before sending updated notification
  group_interval: 5m

  # Repeat interval for ongoing alerts
  repeat_interval: 4h

  # Child routes
  routes:
    # Critical alerts - immediate notification
    - match:
        severity: critical
      receiver: 'critical-alerts'
      group_wait: 10s
      repeat_interval: 1h
      continue: true

    # Database alerts
    - match:
        team: database
      receiver: 'database-team'
      group_by: ['alertname', 'database']

    # Backend alerts
    - match:
        team: backend
      receiver: 'backend-team'
      group_by: ['alertname', 'service']

    # Infrastructure alerts
    - match:
        team: infrastructure
      receiver: 'infrastructure-team'
      group_by: ['alertname', 'instance']

    # Warning alerts - less urgent
    - match:
        severity: warning
      receiver: 'slack-notifications'
      group_wait: 5m
      repeat_interval: 8h

    # Info alerts - daily summary
    - match:
        severity: info
      receiver: 'slack-notifications'
      group_wait: 1h
      repeat_interval: 24h

# ============================================================
# Inhibition Rules
# ============================================================
inhibit_rules:
  # If critical alert fires, suppress warning for same alertname
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'cluster', 'service']

  # If service is down, suppress other alerts for that service
  - source_match:
      alertname: 'DjangoServiceDown'
    target_match_re:
      alertname: 'Django.*'
    equal: ['instance']

  - source_match:
      alertname: 'PostgreSQLDown'
    target_match_re:
      alertname: 'PostgreSQL.*'
    equal: ['instance']

  - source_match:
      alertname: 'RedisDown'
    target_match_re:
      alertname: 'Redis.*'
    equal: ['instance']

# ============================================================
# Receivers
# ============================================================
receivers:
  # Default Slack notifications
  - name: 'slack-notifications'
    slack_configs:
      - channel: '#aureon-alerts'
        send_resolved: true
        title: '{{ template "slack.default.title" . }}'
        text: '{{ template "slack.default.text" . }}'
        actions:
          - type: button
            text: 'View in Grafana'
            url: 'https://aureon.rhematek-solutions.com/grafana'
          - type: button
            text: 'View in Prometheus'
            url: 'https://aureon.rhematek-solutions.com/prometheus'

  # Critical alerts - multiple channels
  - name: 'critical-alerts'
    slack_configs:
      - channel: '#aureon-critical'
        send_resolved: true
        color: '{{ if eq .Status "firing" }}danger{{ else }}good{{ end }}'
        title: '[CRITICAL] {{ .CommonLabels.alertname }}'
        text: '{{ range .Alerts }}{{ .Annotations.description }}{{ end }}'
    email_configs:
      - to: 'alerts@rhematek-solutions.com,stephane@rhematek-solutions.com'
        send_resolved: true
        html: '{{ template "email.default.html" . }}'
    # pagerduty_configs:
    #   - service_key: '${PAGERDUTY_SERVICE_KEY}'
    #     severity: 'critical'

  # Database team
  - name: 'database-team'
    slack_configs:
      - channel: '#aureon-database'
        send_resolved: true
    email_configs:
      - to: 'database-team@rhematek-solutions.com'
        send_resolved: true

  # Backend team
  - name: 'backend-team'
    slack_configs:
      - channel: '#aureon-backend'
        send_resolved: true
    email_configs:
      - to: 'backend-team@rhematek-solutions.com'
        send_resolved: true

  # Infrastructure team
  - name: 'infrastructure-team'
    slack_configs:
      - channel: '#aureon-infrastructure'
        send_resolved: true
    email_configs:
      - to: 'infra-team@rhematek-solutions.com'
        send_resolved: true

  # Null receiver for silenced alerts
  - name: 'null'
