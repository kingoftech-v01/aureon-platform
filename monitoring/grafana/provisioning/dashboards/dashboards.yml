# ============================================================
# Aureon SaaS Platform - Grafana Dashboard Provisioning
# Rhematek Production Shield
# ============================================================

apiVersion: 1

providers:
  - name: 'Aureon Dashboards'
    orgId: 1
    folder: 'Aureon'
    folderUid: 'aureon'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: true
