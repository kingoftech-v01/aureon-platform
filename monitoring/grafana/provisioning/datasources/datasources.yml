# ============================================================
# Aureon SaaS Platform - Grafana Datasources
# Rhematek Production Shield
# ============================================================

apiVersion: 1

datasources:
  # ============================================================
  # Prometheus - Primary Metrics Source
  # ============================================================
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false
    jsonData:
      httpMethod: POST
      timeInterval: "15s"
      queryTimeout: "60s"
      exemplarTraceIdDestinations:
        - name: trace_id
          datasourceUid: tempo
    version: 1

  # ============================================================
  # Redis - Cache Metrics
  # ============================================================
  - name: Redis
    type: redis-datasource
    access: proxy
    url: redis://redis-cache:6379
    editable: false
    jsonData:
      client: standalone
    secureJsonData:
      password: ${REDIS_PASSWORD}
    version: 1

  # ============================================================
  # PostgreSQL - Database Metrics
  # ============================================================
  - name: PostgreSQL
    type: postgres
    access: proxy
    url: pgbouncer:6432
    database: aureon_db
    user: aureon_user
    editable: false
    jsonData:
      sslmode: disable
      maxOpenConns: 5
      maxIdleConns: 2
      connMaxLifetime: 14400
    secureJsonData:
      password: ${DB_PASSWORD}
    version: 1

  # ============================================================
  # Alertmanager
  # ============================================================
  - name: Alertmanager
    type: alertmanager
    access: proxy
    url: http://alertmanager:9093
    editable: false
    jsonData:
      implementation: prometheus
    version: 1
