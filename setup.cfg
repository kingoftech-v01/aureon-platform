[tool:pytest]
DJANGO_SETTINGS_MODULE = finance.settings
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

[coverage:run]
source = apps
branch = True
omit =
    */migrations/*
    */tests/*
    */__init__.py
    */admin.py
    */apps.py
    */.venv/*

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    def __str__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    if settings.DEBUG:
    pass

show_missing = True
fail_under = 80

[coverage:html]
directory = htmlcov

[coverage:xml]
output = coverage.xml

[flake8]
max-line-length = 120
exclude =
    .git,
    __pycache__,
    migrations,
    .venv,
    htmlcov
ignore =
    E501,
    W503

[isort]
profile = django
line_length = 120
skip = migrations,.venv
known_django = django
known_first_party = apps
sections = FUTURE,STDLIB,DJANGO,THIRDPARTY,FIRSTPARTY,LOCALFOLDER
