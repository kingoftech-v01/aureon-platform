[pytest]
# Django settings module
DJANGO_SETTINGS_MODULE = config.settings_test

# Python path
pythonpath = .

# Test file patterns
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Test directories
testpaths =
    tests
    apps/accounts/tests
    apps/clients/tests
    apps/contracts/tests
    apps/invoicing/tests
    apps/payments/tests
    apps/webhooks/tests
    apps/documents/tests
    apps/integrations/tests
    apps/analytics/tests
    apps/notifications/tests
    apps/subscriptions/tests
    apps/core/tests

# Markers
markers =
    django_db: Mark test to use the database
    slow: Mark test as slow running
    security: Mark test as security related
    integration: Mark test as integration test

# Coverage configuration
addopts =
    --strict-markers
    -v
    --tb=short
    --cov
    --cov-config=.coveragerc
    --cov-report=term-missing
    --cov-report=html:htmlcov
    --cov-fail-under=99

# Filter warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning

# Logging
log_cli = true
log_cli_level = WARNING
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s (%(filename)s:%(lineno)s)
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Console output options
console_output_style = progress

# Parallel testing (uncomment if using pytest-xdist)
# addopts = -n auto
